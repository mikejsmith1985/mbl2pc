<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mbl2pc</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f0f2f5; --surface:#fff; --header-from:#4f46e5; --header-to:#7c3aed;
            --sent-bg:#4f46e5; --sent-text:#fff; --recv-bg:#fff; --recv-text:#1a1a2e;
            --input-bg:#f0f2f5; --input-border:#d1d5db; --meta:#9ca3af;
            --shadow:0 1px 3px rgba(0,0,0,.12); --radius:18px;
            --pin-bg:#fffbeb; --pin-border:#f59e0b;
            --snip-bg:#f8fafc; --snip-border:#e2e8f0;
        }
        [data-theme="dark"] {
            --bg:#0f172a; --surface:#1e293b; --header-from:#3730a3; --header-to:#5b21b6;
            --sent-bg:#4f46e5; --sent-text:#fff; --recv-bg:#1e293b; --recv-text:#e2e8f0;
            --input-bg:#1e293b; --input-border:#334155; --meta:#64748b;
            --shadow:0 1px 3px rgba(0,0,0,.4);
            --pin-bg:#1c1a05; --pin-border:#f59e0b;
            --snip-bg:#0f172a; --snip-border:#334155;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--recv-text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

        /* Header */
        header{background:linear-gradient(135deg,var(--header-from),var(--header-to));color:#fff;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
        header .avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5);flex-shrink:0}
        header .avatar-placeholder{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
        header .info{flex:1;min-width:0}
        header .info .app-name{font-weight:600;font-size:1rem}
        header .info .device-row{display:flex;align-items:center;gap:.3rem;font-size:.78rem;opacity:.85;margin-top:1px}
        #deviceName{background:none;border:none;color:#fff;font-family:inherit;font-size:.78rem;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.4);padding:0;min-width:60px;max-width:140px}
        #deviceName:focus{outline:none;border-bottom-color:#fff}
        header .btn-icon{background:none;border:none;color:#fff;cursor:pointer;padding:.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.85;transition:opacity .15s,background .15s}
        header .btn-icon:hover{opacity:1;background:rgba(255,255,255,.12)}

        /* Pinned panel */
        #pinnedPanel{flex-shrink:0;background:var(--pin-bg);border-bottom:2px solid var(--pin-border);display:none;max-height:160px;overflow-y:auto}
        .pinned-header{display:flex;align-items:center;justify-content:space-between;padding:.4rem .75rem;font-size:.78rem;font-weight:600;color:#92400e;cursor:pointer;user-select:none}
        [data-theme="dark"] .pinned-header{color:#fbbf24}
        #pinnedList{padding:.25rem .75rem .5rem}
        .pinned-item{display:flex;align-items:center;gap:.5rem;padding:.25rem 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:.85rem}
        .pinned-item:last-child{border-bottom:none}
        .pinned-item .p-sender{font-size:.7rem;color:var(--meta);min-width:40px}
        .pinned-item .p-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .pinned-item .p-copy{background:none;border:none;cursor:pointer;color:var(--meta);font-size:.85rem;padding:.1rem .3rem;border-radius:4px}
        .pinned-item .p-copy:hover{color:var(--header-from)}

        /* Search bar */
        #searchBar{flex-shrink:0;background:var(--surface);padding:.4rem .75rem;border-bottom:1px solid var(--input-border);display:flex;align-items:center;gap:.4rem}
        #searchInput{flex:1;border:1px solid var(--input-border);border-radius:20px;padding:.35rem .85rem;font-family:inherit;font-size:.88rem;background:var(--input-bg);color:var(--recv-text);outline:none}
        #searchInput:focus{border-color:var(--header-from)}
        #searchInput::placeholder{color:var(--meta)}
        #clearSearch{background:none;border:none;color:var(--meta);cursor:pointer;font-size:1.1rem;line-height:1;display:none}

        /* Date separator */
        .date-sep{display:flex;align-items:center;gap:.6rem;margin:.6rem 0;flex-shrink:0}
        .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--input-border)}
        .date-sep span{font-size:.72rem;font-weight:600;color:var(--meta);white-space:nowrap;padding:.15rem .5rem;background:var(--surface);border:1px solid var(--input-border);border-radius:10px;cursor:pointer;transition:background .15s,color .15s}
        .date-sep span:hover{background:var(--header-from);color:#fff;border-color:var(--header-from)}
        .date-sep.active-date span{background:var(--header-from);color:#fff;border-color:var(--header-from)}

        /* Calendar picker (hidden native input used as trigger) */
        #calendarInput{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;margin:0}
        #calendarBtn{position:relative;overflow:hidden}

        /* Chat */
        #chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.4rem;scroll-behavior:smooth}
        #chat:empty::after{content:'No messages yet. Say hello! 👋';display:block;text-align:center;color:var(--meta);font-size:.9rem;margin-top:2rem}

        /* Bubbles */
        .bubble{display:flex;flex-direction:column;max-width:75%;padding:.55rem .85rem;border-radius:var(--radius);box-shadow:var(--shadow);animation:pop-in .2s ease-out;word-break:break-word;position:relative}
        @keyframes pop-in{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .bubble.sent{background:var(--sent-bg);color:var(--sent-text);align-self:flex-end;border-bottom-right-radius:4px}
        .bubble.received{color:var(--recv-text);align-self:flex-start;border-bottom-left-radius:4px;border:2px solid}
        .bubble.is-starred{box-shadow:0 0 0 2px #f59e0b,var(--shadow)}
        .bubble .sender{font-size:.7rem;font-weight:600;opacity:.7;margin-bottom:2px}
        .bubble .text{font-size:.95rem;line-height:1.45}
        .bubble .timestamp{font-size:.65rem;opacity:.55;align-self:flex-end;margin-top:3px}
        .bubble img{max-width:220px;max-height:220px;border-radius:10px;margin-top:4px;display:block;object-fit:cover}
        .bubble .starred-badge{position:absolute;top:-6px;right:-4px;font-size:.75rem}

        /* Bubble action buttons */
        .bubble-actions{display:flex;gap:.2rem;margin-top:.35rem;opacity:0;transition:opacity .15s}
        .bubble:hover .bubble-actions,.bubble:focus-within .bubble-actions{opacity:1}
        @media(max-width:600px){.bubble-actions{opacity:1}}
        .ba{background:rgba(0,0,0,.08);border:none;border-radius:6px;padding:.15rem .35rem;cursor:pointer;font-size:.78rem;color:inherit;transition:background .12s}
        .bubble.sent .ba{background:rgba(255,255,255,.2);color:#fff}
        .ba:hover{background:rgba(0,0,0,.18)}
        .bubble.sent .ba:hover{background:rgba(255,255,255,.35)}

        /* File card */
        .file-card{display:flex;align-items:center;gap:.6rem;background:rgba(0,0,0,.07);border-radius:10px;padding:.5rem .75rem;margin-top:4px;text-decoration:none;color:inherit;max-width:260px}
        .bubble.sent .file-card{background:rgba(255,255,255,.15);color:#fff}
        .file-card .file-icon{font-size:1.6rem;flex-shrink:0}
        .file-card .fname{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .file-card .fhint{font-size:.7rem;opacity:.6}

        /* Spinner */
        #spinner{display:none;flex-direction:column;align-items:center;gap:.5rem;color:var(--meta);font-size:.85rem;padding:2rem 0}
        .spin{width:28px;height:28px;border:3px solid var(--input-border);border-top-color:var(--header-from);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Snippets panel */
        #snippetsPanel{flex-shrink:0;background:var(--snip-bg);border-top:1px solid var(--snip-border);max-height:200px;overflow:hidden;transition:max-height .2s}
        #snippetsPanel.collapsed{max-height:38px}
        .snip-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;cursor:pointer;user-select:none;font-size:.82rem;font-weight:600;color:var(--recv-text)}
        .snip-header span{display:flex;align-items:center;gap:.4rem}
        .snip-add-btn{background:var(--header-from);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
        #snippetsList{padding:0 .75rem .5rem;display:flex;flex-direction:column;gap:.25rem;overflow-y:auto;max-height:120px}
        .snip-item{display:flex;align-items:center;gap:.4rem;padding:.25rem .4rem;border-radius:8px;background:var(--surface);border:1px solid var(--input-border);font-size:.82rem}
        .snip-name{font-weight:600;min-width:60px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--header-from)}
        .snip-content{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--meta)}
        .snip-copy,.snip-del{background:none;border:none;cursor:pointer;font-size:.85rem;padding:.15rem .3rem;border-radius:4px;color:var(--meta)}
        .snip-copy:hover{color:var(--header-from)}
        .snip-del:hover{color:#ef4444}
        #addSnippetForm{display:none;padding:.4rem .75rem .5rem;gap:.35rem;flex-direction:column}
        #addSnippetForm input,#addSnippetForm textarea{border:1px solid var(--input-border);border-radius:8px;padding:.3rem .6rem;font-family:inherit;font-size:.82rem;background:var(--input-bg);color:var(--recv-text);outline:none}
        #addSnippetForm textarea{resize:none;height:52px}
        #addSnippetForm .snip-form-row{display:flex;gap:.4rem}
        #saveSnippetBtn{background:var(--header-from);color:#fff;border:none;border-radius:8px;padding:.3rem .8rem;font-size:.82rem;cursor:pointer}
        #cancelSnippetBtn{background:none;border:1px solid var(--input-border);border-radius:8px;padding:.3rem .8rem;font-size:.82rem;cursor:pointer;color:var(--meta)}

        /* Attach preview */
        #attachPreview{flex-shrink:0;background:var(--surface);padding:0 .75rem .4rem;display:none;align-items:center;gap:.5rem;border-top:1px solid var(--input-border);font-size:.82rem;color:var(--meta)}
        #attachPreview .preview-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--input-border)}
        #attachPreview .preview-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--recv-text);font-weight:500}
        #attachPreview .btn-clear{background:none;border:none;cursor:pointer;color:var(--meta);font-size:1.1rem;line-height:1}

        /* Input bar */
        .input-bar{flex-shrink:0;background:var(--surface);padding:.6rem .75rem;border-top:1px solid var(--input-border);display:flex;align-items:flex-end;gap:.4rem}
        .input-bar textarea{flex:1;resize:none;border:1px solid var(--input-border);border-radius:22px;padding:.55rem 1rem;font-family:inherit;font-size:.95rem;background:var(--input-bg);color:var(--recv-text);outline:none;max-height:120px;overflow-y:auto;line-height:1.4;transition:border-color .15s}
        .input-bar textarea:focus{border-color:var(--header-from)}
        .input-bar textarea::placeholder{color:var(--meta)}
        .btn-round{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;font-size:.85rem}
        .btn-round:active{transform:scale(.93)}
        .btn-attach{background:var(--input-bg);color:var(--meta);border:1px solid var(--input-border)}
        .btn-attach:hover{color:var(--header-from);border-color:var(--header-from)}
        .btn-expiry{background:var(--input-bg);color:var(--meta);border:1px solid var(--input-border);position:relative}
        .btn-expiry.active{border-color:var(--header-from);color:var(--header-from)}
        .btn-paste{background:var(--input-bg);color:var(--meta);border:1px solid var(--input-border)}
        .btn-paste:hover{border-color:var(--header-from);color:var(--header-from)}
        .btn-notif{background:none;border:none;color:#fff;cursor:pointer;padding:0.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0.85;transition:opacity .15s,background .15s}
        .btn-notif:hover{opacity:1;background:rgba(255,255,255,.12)}
        .btn-notif.active{color:#fbbf24;opacity:1}
        header .btn-icon.active{background:rgba(255,255,255,.2);opacity:1}
        .btn-send{background:var(--header-from);color:#fff}
        .btn-send:hover{background:var(--header-to)}
        #fileInput{display:none}

        /* Expiry picker popup */
        #expiryPicker{position:absolute;bottom:60px;right:.75rem;background:var(--surface);border:1px solid var(--input-border);border-radius:12px;padding:.5rem;display:none;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:100}
        #expiryPicker label{font-size:.8rem;color:var(--meta);display:block;margin-bottom:.3rem;font-weight:500}
        #expirySelect{width:100%;border:1px solid var(--input-border);border-radius:8px;padding:.3rem .5rem;font-family:inherit;font-size:.85rem;background:var(--input-bg);color:var(--recv-text);outline:none}

        /* Notification help modal */
        #notifModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:1rem}
        #notifModal.open{display:flex}
        .notif-card{background:var(--surface);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.3)}
        .notif-card h3{font-size:1rem;font-weight:600;margin-bottom:.5rem}
        .notif-card p{font-size:.85rem;color:var(--meta);margin-bottom:.8rem;line-height:1.5}
        .notif-card ol{font-size:.85rem;line-height:1.8;padding-left:1.2rem;color:var(--recv-text);margin-bottom:1rem}
        .notif-card ol li{margin-bottom:.2rem}
        .notif-card .notif-actions{display:flex;gap:.5rem;justify-content:flex-end}
        .notif-card button{border:none;border-radius:8px;padding:.4rem .9rem;font-size:.85rem;font-weight:500;cursor:pointer}
        .notif-card .btn-primary{background:var(--header-from);color:#fff}
        .notif-card .btn-secondary{background:var(--input-bg);color:var(--recv-text);border:1px solid var(--input-border)}

        /* Toast */
        #toastContainer{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:.4rem;z-index:1000;pointer-events:none}
        .toast{background:#1e293b;color:#fff;padding:.5rem 1.1rem;border-radius:20px;font-size:.85rem;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.25);animation:toast-in .25s ease-out,toast-out .3s ease-in 2.2s forwards;white-space:nowrap;display:flex;align-items:center;gap:.4rem}
        .toast.success::before{content:'✓';color:#10b981}
        .toast.error::before{content:'✕';color:#ef4444}
        @keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toast-out{from{opacity:1}to{opacity:0}}

        /* Version */
        #version{text-align:center;font-size:.7rem;color:var(--meta);padding:2px 0 4px;background:var(--surface);flex-shrink:0}

        /* Scrollbar */
        #chat::-webkit-scrollbar,#snippetsList::-webkit-scrollbar{width:4px}
        #chat::-webkit-scrollbar-thumb,#snippetsList::-webkit-scrollbar-thumb{background:var(--input-border);border-radius:4px}

        /* Mobile */
        @media(max-width:480px){header{padding:.6rem .75rem}.bubble{max-width:88%}}
    </style>
</head>
<body>
    <header>
        <div id="avatarWrap"></div>
        <div class="info">
            <div class="app-name">mbl2pc</div>
            <div class="device-row">📱 <input id="deviceName" type="text" placeholder="Device name" title="Click to rename"></div>
        </div>
        <button class="btn-icon" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
            <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
            </svg>
        </button>
        <button class="btn-notif" id="notifBtn" title="Enable notifications" aria-label="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>
        <button class="btn-icon" id="calendarBtn" title="Jump to date" aria-label="Browse by date">
            <input type="date" id="calendarInput" title="Pick a date">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </button>
        <button class="btn-icon" id="logoutBtn" title="Logout" aria-label="Logout" onclick="window.location.href='/logout'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </button>
    </header>

    <div id="pinnedPanel">
        <div class="pinned-header" id="pinnedToggle">
            <span>📌 Pinned</span>
            <span id="pinnedCount"></span>
        </div>
        <div id="pinnedList"></div>
    </div>

    <div id="searchBar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--meta);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search messages…" autocomplete="off">
        <button id="clearSearch">✕</button>
    </div>

    <div id="spinner"><div class="spin"></div>Loading…</div>
    <div id="chat"></div>

    <div id="snippetsPanel" class="collapsed">
        <div class="snip-header" id="snippetsToggle">
            <span>⚡ Snippets <small id="snipCount" style="color:var(--meta);font-weight:400"></small></span>
            <button class="snip-add-btn" id="addSnippetBtn" title="Add snippet">+</button>
        </div>
        <div id="snippetsList"></div>
        <div id="addSnippetForm">
            <input id="snippetName" placeholder="Name (e.g. Home WiFi, SSH key)" maxlength="50">
            <textarea id="snippetContent" placeholder="Content to copy…"></textarea>
            <div class="snip-form-row">
                <button id="saveSnippetBtn">Save</button>
                <button id="cancelSnippetBtn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="attachPreview">
        <span id="previewContent"></span>
        <span id="previewName" class="preview-name"></span>
        <button class="btn-clear" id="clearAttach">✕</button>
    </div>

    <div style="position:relative">
        <div id="expiryPicker">
            <label>Message expires after:</label>
            <select id="expirySelect">
                <option value="0">Never</option>
                <option value="1">1 hour</option>
                <option value="24">24 hours</option>
                <option value="168">7 days</option>
            </select>
        </div>
    </div>

    <div class="input-bar">
        <input type="file" id="fileInput" accept="*">
        <button class="btn-round btn-attach" id="attachBtn" title="Attach file" aria-label="Attach file">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <textarea id="msgInput" rows="1" placeholder="Message…" autocomplete="off"></textarea>
        <button class="btn-round btn-paste" id="pasteBtn" title="Paste clipboard &amp; send" aria-label="Paste and send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
        </button>
        <button class="btn-round btn-expiry" id="expiryBtn" title="Set expiry">⏱</button>
        <button class="btn-round btn-send" id="sendBtn" aria-label="Send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
    <div id="version"></div>
    <div id="toastContainer"></div>

    <!-- Notification blocked help modal -->
    <div id="notifModal" role="dialog" aria-modal="true">
        <div class="notif-card">
            <h3>🔔 Notifications are blocked</h3>
            <p>Your browser has blocked notifications for this site. Here's how to fix it:</p>
            <div id="notifSteps"></div>
            <div class="notif-actions">
                <button class="btn-secondary" id="notifModalClose">Dismiss</button>
                <button class="btn-primary" id="notifModalRetry">Try again</button>
            </div>
        </div>
    </div>

    <script>
    'use strict';
    const API = window.location.origin;
    const html = document.documentElement;

    // ── Toast ──────────────────────────────────────────────────────────
    function toast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 2600);
    }

    // ── Theme ──────────────────────────────────────────────────────────
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(dark) {
        html.setAttribute('data-theme', dark ? 'dark' : 'light');
        themeIcon.innerHTML = dark
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
        localStorage.setItem('mbl2pc_theme', dark ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('mbl2pc_theme');
    applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.getElementById('themeToggle').addEventListener('click', () => applyTheme(html.getAttribute('data-theme') !== 'dark'));

    // ── Device name ────────────────────────────────────────────────────
    function detectDevice() {
        const ua = navigator.userAgent;
        if (/iPad/.test(ua)) return 'iPad';
        if (/iPhone/.test(ua)) return 'iPhone';
        if (/Android/.test(ua)) return 'Android';
        if (/CrOS/.test(ua)) return 'Chromebook';
        if (/Macintosh|Mac OS X/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'PC';
        if (/Linux/.test(ua)) return 'Linux';
        return 'Device';
    }
    const deviceInput = document.getElementById('deviceName');
    let deviceName = localStorage.getItem('mbl2pc_sender') || detectDevice();
    deviceInput.value = deviceName;
    deviceInput.addEventListener('change', () => {
        deviceName = deviceInput.value.trim() || detectDevice();
        deviceInput.value = deviceName;
        localStorage.setItem('mbl2pc_sender', deviceName);
        toast('Device name saved');
    });

    // ── Per-device palette ─────────────────────────────────────────────
    const PAL_L = [{bg:'#fef3c7',b:'#f59e0b'},{bg:'#d1fae5',b:'#10b981'},{bg:'#fce7f3',b:'#ec4899'},{bg:'#e0e7ff',b:'#6366f1'},{bg:'#ffedd5',b:'#f97316'},{bg:'#f0fdf4',b:'#22c55e'},{bg:'#fdf2f8',b:'#a855f7'},{bg:'#fff1f2',b:'#f43f5e'}];
    const PAL_D = [{bg:'#451a03',b:'#f59e0b'},{bg:'#022c22',b:'#10b981'},{bg:'#500724',b:'#ec4899'},{bg:'#1e1b4b',b:'#6366f1'},{bg:'#431407',b:'#f97316'},{bg:'#052e16',b:'#22c55e'},{bg:'#2e1065',b:'#a855f7'},{bg:'#4c0519',b:'#f43f5e'}];
    function senderPalette(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
        const dark = html.getAttribute('data-theme') === 'dark';
        return (dark ? PAL_D : PAL_L)[h % 8];
    }

    // ── User profile ───────────────────────────────────────────────────
    async function loadMe() {
        try {
            const res = await fetch(API + '/me');
            if (!res.ok) return;
            const d = await res.json();
            const wrap = document.getElementById('avatarWrap');
            if (d.picture) {
                const img = document.createElement('img');
                img.className = 'avatar'; img.src = d.picture; img.alt = d.name || 'Avatar';
                wrap.appendChild(img);
            } else {
                const ph = document.createElement('div');
                ph.className = 'avatar-placeholder';
                ph.textContent = (d.name || '?')[0].toUpperCase();
                wrap.appendChild(ph);
            }
        } catch (_) {}
    }

    // ── Version ────────────────────────────────────────────────────────
    async function loadVersion() {
        try {
            const r = await fetch(API + '/version');
            const d = await r.json();
            document.getElementById('version').textContent = 'v' + d.version;
        } catch (_) {}
    }

    // ── Helpers ────────────────────────────────────────────────────────
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    const IMG_EXT = ['.jpg','.jpeg','.png','.gif','.webp'];
    function fext(n) { return (n||'').split('.').pop().toLowerCase(); }
    function isImg(n) { return IMG_EXT.includes('.'+fext(n)); }
    function ficon(n) {
        const e=fext(n);
        if(['pdf'].includes(e)) return '📄';
        if(['doc','docx'].includes(e)) return '📝';
        if(['xls','xlsx','csv'].includes(e)) return '📊';
        if(['zip','rar','7z','tar','gz'].includes(e)) return '🗜️';
        if(['mp4','mov','avi','mkv'].includes(e)) return '🎬';
        if(['mp3','wav','aac','flac'].includes(e)) return '🎵';
        return '📎';
    }
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta); toast('Copied!');
        });
    }

    // ── Pinned panel ───────────────────────────────────────────────────
    let allMessages = [];
    function renderPinned() {
        const pinned = allMessages.filter(m => m.starred);
        const panel = document.getElementById('pinnedPanel');
        const list = document.getElementById('pinnedList');
        document.getElementById('pinnedCount').textContent = pinned.length ? `(${pinned.length})` : '';
        if (!pinned.length) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        list.innerHTML = '';
        pinned.forEach(m => {
            const div = document.createElement('div');
            div.className = 'pinned-item';
            const label = m.text || (m.image_url ? '🖼 Image' : m.file_name || '📎 File');
            div.innerHTML = `<span class="p-sender">${esc(m.sender)}</span><span class="p-text">${esc(label)}</span>`;
            if (m.text) {
                const btn = document.createElement('button');
                btn.className = 'p-copy'; btn.title = 'Copy'; btn.textContent = '📋';
                btn.onclick = () => copyToClipboard(m.text);
                div.appendChild(btn);
            }
            list.appendChild(div);
        });
    }
    document.getElementById('pinnedToggle').addEventListener('click', () => {
        const list = document.getElementById('pinnedList');
        list.style.display = list.style.display === 'none' ? '' : 'none';
    });

    // ── Messages ───────────────────────────────────────────────────────
    let lastMsgCount = 0;
    let activeDateFilter = '';

    function fmtDateLabel(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        if (isNaN(d)) return '';
        const today = new Date(); today.setHours(0,0,0,0);
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
        const msgDay = new Date(d); msgDay.setHours(0,0,0,0);
        if (msgDay.getTime() === today.getTime()) return 'Today';
        if (msgDay.getTime() === yesterday.getTime()) return 'Yesterday';
        return d.toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric', year:'numeric'});
    }

    function dateOf(ts) { return ts ? ts.slice(0, 10) : ''; }

    function renderMessages(messages) {
        allMessages = messages;
        renderPinned();
        const chat = document.getElementById('chat');
        if (messages.length === lastMsgCount && lastMsgCount > 0) return;
        lastMsgCount = messages.length;
        chat.innerHTML = '';
        let lastDate = '';
        messages.forEach(m => {
            // Date separator
            const msgDate = dateOf(m.timestamp);
            if (msgDate && msgDate !== lastDate) {
                lastDate = msgDate;
                const sep = document.createElement('div');
                sep.className = 'date-sep' + (activeDateFilter === msgDate ? ' active-date' : '');
                sep.dataset.date = msgDate;
                const lbl = document.createElement('span');
                lbl.textContent = fmtDateLabel(m.timestamp);
                lbl.title = 'View only this day';
                lbl.onclick = () => jumpToDate(msgDate);
                sep.appendChild(lbl);
                chat.appendChild(sep);
            }

            const div = document.createElement('div');
            const isMe = (m.sender||'').toLowerCase() === deviceName.toLowerCase();
            div.className = 'bubble ' + (isMe ? 'sent' : 'received') + (m.starred ? ' is-starred' : '');
            div.dataset.id = m.id;
            div.dataset.text = m.text || '';
            if (!isMe) {
                const p = senderPalette(m.sender||'unknown');
                div.style.background = p.bg;
                div.style.borderColor = p.b;
            }
            let inner = `<span class="sender">${esc(m.sender||'unknown')}</span>`;
            if (m.starred) inner += `<span class="starred-badge">⭐</span>`;
            if (m.image_url) inner += `<img src="${esc(m.image_url)}" loading="lazy" alt="image">`;
            if (m.file_url) {
                const fname = m.file_name||'file';
                if (isImg(fname)) {
                    inner += `<img src="${esc(m.file_url)}" loading="lazy" alt="${esc(fname)}">`;
                } else {
                    inner += `<a class="file-card" href="${esc(m.file_url)}" target="_blank" rel="noopener"><span class="file-icon">${ficon(fname)}</span><span><span class="fname">${esc(fname)}</span><br><span class="fhint">Tap to download</span></span></a>`;
                }
            }
            if (m.text) inner += `<span class="text">${esc(m.text)}</span>`;
            inner += `<span class="timestamp">${esc((m.timestamp||'').replace('T',' '))}</span>`;
            // Action buttons
            inner += `<div class="bubble-actions">`;
            if (m.text || m.file_url || m.image_url) inner += `<button class="ba ba-copy" title="Copy text">📋</button>`;
            inner += `<button class="ba ba-star" title="${m.starred?'Unpin':'Pin'}">${m.starred?'★':'☆'}</button>`;
            inner += `<button class="ba ba-del" title="Delete">✕</button>`;
            inner += `</div>`;
            div.innerHTML = inner;

            // Wire up action buttons
            const copyBtn = div.querySelector('.ba-copy');
            if (copyBtn) copyBtn.onclick = () => {
                const text = m.text || m.file_url || m.image_url || '';
                copyToClipboard(text);
            };
            div.querySelector('.ba-star').onclick = () => toggleStar(m.id);
            div.querySelector('.ba-del').onclick = () => deleteMessage(m.id, div);

            chat.appendChild(div);
        });
        setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
    }

    async function toggleStar(id) {
        try {
            const res = await fetch(`${API}/messages/${id}/star`, {method:'PATCH'});
            if (!res.ok) { toast('Failed to pin', 'error'); return; }
            const d = await res.json();
            toast(d.starred ? 'Pinned ⭐' : 'Unpinned');
            lastMsgCount = 0; // force re-render
            await fetchMessages();
        } catch (_) { toast('Error', 'error'); }
    }

    async function deleteMessage(id, el) {
        if (!confirm('Delete this message?')) return;
        try {
            const res = await fetch(`${API}/messages/${id}`, {method:'DELETE'});
            if (!res.ok) { toast('Delete failed', 'error'); return; }
            el.style.animation = 'none';
            el.style.transition = 'opacity .2s,transform .2s';
            el.style.opacity = '0'; el.style.transform = 'scale(.9)';
            setTimeout(() => { el.remove(); lastMsgCount--; renderPinned(); }, 220);
            toast('Deleted');
        } catch (_) { toast('Error', 'error'); }
    }

    async function fetchMessages(q = '', date = '') {
        try {
            let url = `${API}/messages`;
            const params = new URLSearchParams();
            if (q) params.set('q', q);
            if (date) params.set('date', date);
            if ([...params].length) url += '?' + params.toString();
            const res = await fetch(url);
            if (res.status === 401) { window.location.href = '/login'; return; }
            const d = await res.json();
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            renderMessages(d.messages || []);
        } catch (_) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
        }
    }

    // ── Calendar date jump ─────────────────────────────────────────────
    function jumpToDate(dateStr) {
        activeDateFilter = dateStr;
        lastMsgCount = 0;
        // Update calendar input value to match
        const cal = document.getElementById('calendarInput');
        cal.value = dateStr;
        document.getElementById('calendarBtn').classList.add('active');
        fetchMessages('', dateStr);
        toast(`Showing ${fmtDateLabel(dateStr + 'T12:00:00')}`);
    }

    function clearDateFilter() {
        activeDateFilter = '';
        document.getElementById('calendarInput').value = '';
        document.getElementById('calendarBtn').classList.remove('active');
        lastMsgCount = 0;
        fetchMessages();
    }

    document.getElementById('calendarInput').max = new Date().toISOString().slice(0, 10);
    document.getElementById('calendarInput').addEventListener('change', e => {
        const date = e.target.value;
        if (date) jumpToDate(date);
        else clearDateFilter();
    });
    // Clicking the button when already filtering clears it (tap the SVG area outside the input)
    document.getElementById('calendarBtn').addEventListener('click', e => {
        if (e.target === e.currentTarget || e.target.tagName === 'svg' || e.target.tagName === 'line' || e.target.tagName === 'rect') {
            if (activeDateFilter) clearDateFilter();
        }
    });

    // ── Search ─────────────────────────────────────────────────────────
    let searchTimer = null;
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim();
        clearSearch.style.display = q ? '' : 'none';
        // Clear date filter when searching
        if (q) { activeDateFilter = ''; document.getElementById('calendarBtn').classList.remove('active'); }
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { lastMsgCount = 0; fetchMessages(q); }, 350);
    });
    clearSearch.addEventListener('click', () => {
        searchInput.value = ''; clearSearch.style.display = 'none';
        lastMsgCount = 0; fetchMessages();
    });

    // ── Snippets ───────────────────────────────────────────────────────
    let snippets = [];
    async function loadSnippets() {
        try {
            const res = await fetch(API + '/snippets');
            if (!res.ok) return;
            const d = await res.json();
            snippets = d.snippets || [];
            renderSnippets();
        } catch (_) {}
    }
    function renderSnippets() {
        const list = document.getElementById('snippetsList');
        document.getElementById('snipCount').textContent = snippets.length ? `(${snippets.length})` : '';
        list.innerHTML = '';
        snippets.forEach(s => {
            const div = document.createElement('div');
            div.className = 'snip-item';
            div.innerHTML = `<span class="snip-name">${esc(s.name)}</span><span class="snip-content">${esc(s.content)}</span>`;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'snip-copy'; copyBtn.title = 'Copy'; copyBtn.textContent = '📋';
            copyBtn.onclick = () => copyToClipboard(s.content);
            const delBtn = document.createElement('button');
            delBtn.className = 'snip-del'; delBtn.title = 'Delete'; delBtn.textContent = '✕';
            delBtn.onclick = () => deleteSnippet(s.id);
            div.appendChild(copyBtn); div.appendChild(delBtn);
            list.appendChild(div);
        });
    }
    async function deleteSnippet(id) {
        if (!confirm('Delete snippet?')) return;
        try {
            await fetch(`${API}/snippets/${id}`, {method:'DELETE'});
            snippets = snippets.filter(s => s.id !== id);
            renderSnippets();
            toast('Snippet deleted');
        } catch (_) { toast('Error', 'error'); }
    }
    document.getElementById('snippetsToggle').addEventListener('click', e => {
        if (e.target.id === 'addSnippetBtn') return;
        document.getElementById('snippetsPanel').classList.toggle('collapsed');
    });
    document.getElementById('addSnippetBtn').addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('snippetsPanel').classList.remove('collapsed');
        document.getElementById('addSnippetForm').style.display = 'flex';
        document.getElementById('snippetName').focus();
    });
    document.getElementById('cancelSnippetBtn').addEventListener('click', () => {
        document.getElementById('addSnippetForm').style.display = 'none';
        document.getElementById('snippetName').value = '';
        document.getElementById('snippetContent').value = '';
    });
    document.getElementById('saveSnippetBtn').addEventListener('click', async () => {
        const name = document.getElementById('snippetName').value.trim();
        const content = document.getElementById('snippetContent').value.trim();
        if (!name || !content) { toast('Name and content required', 'error'); return; }
        try {
            const fd = new FormData();
            fd.append('name', name); fd.append('content', content);
            const res = await fetch(API + '/snippets', {method:'POST', body:fd});
            if (!res.ok) { toast('Failed to save', 'error'); return; }
            const d = await res.json();
            snippets.push(d.snippet);
            renderSnippets();
            document.getElementById('addSnippetForm').style.display = 'none';
            document.getElementById('snippetName').value = '';
            document.getElementById('snippetContent').value = '';
            toast('Snippet saved ⚡');
        } catch (_) { toast('Error', 'error'); }
    });

    // ── Expiry picker ──────────────────────────────────────────────────
    const expiryBtn = document.getElementById('expiryBtn');
    const expiryPicker = document.getElementById('expiryPicker');
    const expirySelect = document.getElementById('expirySelect');
    expiryBtn.addEventListener('click', () => {
        const visible = expiryPicker.style.display === 'block';
        expiryPicker.style.display = visible ? 'none' : 'block';
    });
    expirySelect.addEventListener('change', () => {
        const h = parseInt(expirySelect.value);
        expiryBtn.classList.toggle('active', h > 0);
        expiryBtn.title = h > 0 ? `Expires in ${expirySelect.options[expirySelect.selectedIndex].text}` : 'Set expiry';
        expiryPicker.style.display = 'none';
    });
    document.addEventListener('click', e => {
        if (!expiryPicker.contains(e.target) && e.target !== expiryBtn) expiryPicker.style.display = 'none';
    });

    // ── Attachment ─────────────────────────────────────────────────────
    let attachedFile = null;
    const fileInput = document.getElementById('fileInput');
    const attachPreview = document.getElementById('attachPreview');
    const previewContent = document.getElementById('previewContent');
    const previewName = document.getElementById('previewName');
    function showAttachPreview(file) {
        attachedFile = file;
        previewName.textContent = file.name;
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = e => { previewContent.innerHTML = `<img class="preview-thumb" src="${e.target.result}" alt="">`; };
            reader.readAsDataURL(file);
        } else {
            previewContent.innerHTML = `<span style="font-size:1.6rem">${ficon(file.name)}</span>`;
        }
        attachPreview.style.display = 'flex';
    }
    function clearAttach() {
        attachedFile = null; fileInput.value = '';
        previewContent.innerHTML = ''; previewName.textContent = '';
        attachPreview.style.display = 'none';
    }
    document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
    document.getElementById('clearAttach').addEventListener('click', clearAttach);
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) showAttachPreview(fileInput.files[0]); });
    document.addEventListener('paste', e => { if (e.clipboardData?.files[0]) showAttachPreview(e.clipboardData.files[0]); });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer?.files[0]) showAttachPreview(e.dataTransfer.files[0]); });

    // ── Auto-grow textarea ─────────────────────────────────────────────
    const msgInput = document.getElementById('msgInput');
    msgInput.addEventListener('input', () => { msgInput.style.height='auto'; msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px'; });
    msgInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    // ── Send ───────────────────────────────────────────────────────────
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text && !attachedFile) return;
        if (attachedFile) {
            await sendAttachment(attachedFile, text);
        } else {
            await sendText(text);
        }
        msgInput.value = ''; msgInput.style.height = 'auto';
        clearAttach();
        lastMsgCount = 0;
        await fetchMessages();
    }
    async function sendText(text) {
        try {
            const fd = new FormData();
            fd.append('msg', text);
            fd.append('sender', deviceName);
            fd.append('expires_hours', expirySelect.value);
            const res = await fetch(API+'/send', {method:'POST', body:fd});
            if (!res.ok) {
                let detail = `Error ${res.status}`;
                try { const d = await res.json(); detail = d.detail||detail; } catch(_){}
                console.error('[mbl2pc] /send failed:', detail);
                toast(detail, 'error'); return;
            }
            const h = parseInt(expirySelect.value);
            toast(h > 0 ? `Sent (expires in ${expirySelect.options[expirySelect.selectedIndex].text})` : 'Sent!');
        } catch(err) { console.error('[mbl2pc] /send exception:', err); toast('Send failed', 'error'); }
    }
    async function sendAttachment(file, caption) {
        const fd = new FormData();
        fd.append('file', file); fd.append('sender', deviceName); fd.append('text', caption);
        const isImage = file.type.startsWith('image/');
        const endpoint = isImage ? '/send-image' : '/send-file';
        try {
            const res = await fetch(API+endpoint, {method:'POST', body:fd});
            let d = {};
            try { d = await res.json(); } catch(_) {}
            if (!res.ok) { toast(d.detail||'Upload failed','error'); }
            else { toast(isImage ? 'Image sent!' : 'File sent!'); }
        } catch(_) { toast('Upload failed','error'); }
    }

    // ── Share target: handle URL params from OS share sheet ────────────
    function handleShareTarget() {
        const p = new URLSearchParams(window.location.search);
        const parts = [p.get('title'), p.get('text'), p.get('url')].filter(Boolean);
        if (parts.length) {
            msgInput.value = parts.join(' ');
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
            window.history.replaceState({}, '', '/send.html');
            toast('Content ready to send!');
        }
    }

    // ── Paste & Send button ────────────────────────────────────────────
    document.getElementById('pasteBtn').addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (!text.trim()) { toast('Clipboard is empty', 'error'); return; }
            msgInput.value = text;
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
            await sendText();
        } catch (_) {
            toast('Clipboard permission denied — paste manually', 'error');
        }
    });

    // ── Push Notifications ─────────────────────────────────────────────
    const notifBtn = document.getElementById('notifBtn');

    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw = window.atob(base64);
        return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    function getUnblockInstructions() {
        const ua = navigator.userAgent;
        const isIOS = /iPad|iPhone|iPod/.test(ua);
        const isAndroid = /Android/.test(ua);
        const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
        const isFirefox = /Firefox/.test(ua);
        const isSafari = /Safari/.test(ua) && !isChrome;

        if (isIOS && isSafari) {
            return `<p style="font-size:.82rem;color:var(--meta)">On iPhone/iPad (Safari):</p>
                <ol><li>Open the <strong>Settings</strong> app</li>
                <li>Scroll down and tap <strong>Safari</strong></li>
                <li>Tap <strong>Notifications</strong></li>
                <li>Find <strong>mbl2pc.onrender.com</strong> and set to <strong>Allow</strong></li>
                <li>Come back here and tap the bell again</li></ol>`;
        }
        if (isAndroid && isChrome) {
            return `<p style="font-size:.82rem;color:var(--meta)">On Android (Chrome):</p>
                <ol><li>Tap the <strong>lock icon</strong> in the address bar</li>
                <li>Tap <strong>Permissions</strong></li>
                <li>Set <strong>Notifications</strong> to <strong>Allow</strong></li>
                <li>Reload the page and tap the bell again</li></ol>`;
        }
        if (isChrome) {
            return `<p style="font-size:.82rem;color:var(--meta)">On Chrome (desktop):</p>
                <ol><li>Click the <strong>lock icon</strong> (🔒) in the address bar</li>
                <li>Click <strong>Site settings</strong></li>
                <li>Set <strong>Notifications</strong> to <strong>Allow</strong></li>
                <li>Reload the page and tap the bell again</li></ol>`;
        }
        if (isFirefox) {
            return `<p style="font-size:.82rem;color:var(--meta)">On Firefox:</p>
                <ol><li>Click the <strong>shield icon</strong> in the address bar</li>
                <li>Click <strong>Connection secure → More information</strong></li>
                <li>Go to <strong>Permissions → Receive Notifications</strong></li>
                <li>Set to <strong>Allow</strong> and reload</li></ol>`;
        }
        return `<p style="font-size:.82rem;color:var(--meta)">In your browser:</p>
            <ol><li>Click the <strong>lock / info icon</strong> in the address bar</li>
            <li>Find <strong>Notifications</strong> in site permissions</li>
            <li>Change it to <strong>Allow</strong></li>
            <li>Reload the page and tap the bell again</li></ol>`;
    }

    function showNotifBlockedModal() {
        document.getElementById('notifSteps').innerHTML = getUnblockInstructions();
        document.getElementById('notifModal').classList.add('open');
    }

    document.getElementById('notifModalClose').addEventListener('click', () => {
        document.getElementById('notifModal').classList.remove('open');
    });
    document.getElementById('notifModal').addEventListener('click', e => {
        if (e.target === document.getElementById('notifModal'))
            document.getElementById('notifModal').classList.remove('open');
    });
    document.getElementById('notifModalRetry').addEventListener('click', () => {
        document.getElementById('notifModal').classList.remove('open');
        subscribeToPush();
    });

    async function unsubscribeFromPush() {
        try {
            if ('serviceWorker' in navigator) {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.getSubscription();
                if (sub) await sub.unsubscribe();
            }
        } catch(_) {}
        notifBtn.classList.remove('active');
        notifBtn.title = 'Enable notifications';
        localStorage.removeItem('push_subscribed');
        toast('Notifications disabled');
    }

    async function subscribeToPush() {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            toast('Push notifications not supported on this browser', 'error'); return;
        }
        // Already subscribed — toggle off
        if (localStorage.getItem('push_subscribed') === '1' && Notification.permission === 'granted') {
            await unsubscribeFromPush(); return;
        }
        // Already blocked at OS level — show help
        if (Notification.permission === 'denied') {
            showNotifBlockedModal(); return;
        }
        // Request permission
        const perm = await Notification.requestPermission();
        if (perm === 'denied') { showNotifBlockedModal(); return; }
        if (perm !== 'granted') return; // user dismissed — do nothing
        try {
            const reg = await navigator.serviceWorker.ready;
            const keyRes = await fetch(`${API}/push/vapid-public-key`);
            if (!keyRes.ok) { toast('Push not configured on server yet', 'error'); return; }
            const { public_key } = await keyRes.json();
            let sub = await reg.pushManager.getSubscription();
            if (!sub) {
                sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(public_key)
                });
            }
            const res = await fetch(`${API}/push/subscribe`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sub.toJSON())
            });
            if (res.ok) {
                notifBtn.classList.add('active');
                notifBtn.title = 'Notifications enabled — tap to disable';
                localStorage.setItem('push_subscribed', '1');
                toast('Notifications enabled 🔔');
            }
        } catch (e) {
            console.error('Push subscribe error', e);
            toast('Failed to enable notifications', 'error');
        }
    }

    notifBtn.addEventListener('click', subscribeToPush);

    // Restore bell state on load and reflect actual permission state
    (function syncNotifState() {
        const stored = localStorage.getItem('push_subscribed') === '1';
        const perm = ('Notification' in window) ? Notification.permission : 'default';
        if (stored && perm === 'granted') {
            notifBtn.classList.add('active');
            notifBtn.title = 'Notifications enabled — tap to disable';
        } else if (perm === 'denied') {
            // Show a subtle indicator that notifications need attention
            notifBtn.title = 'Notifications blocked — tap for help';
            notifBtn.style.opacity = '0.5';
            localStorage.removeItem('push_subscribed');
        } else {
            notifBtn.title = 'Enable notifications';
            if (stored) localStorage.removeItem('push_subscribed'); // stale
        }
    })();

    // ── PWA service worker ─────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    // ── Init ───────────────────────────────────────────────────────────
    document.getElementById('spinner').style.display = 'flex';
    document.getElementById('chat').style.display = 'none';
    loadMe();
    loadVersion();
    loadSnippets();
    fetchMessages();
    handleShareTarget();
    setInterval(() => {
        const q = searchInput.value.trim();
        // Don't auto-poll when browsing a specific date — only refresh current view
        fetchMessages(q, activeDateFilter);
    }, 4000);
    </script>
</body>
</html>
