<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mbl2pc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ─── CSS custom properties (light + dark) ─── */
        :root {
            --bg:           #f0f2f5;
            --surface:      #ffffff;
            --header-from:  #4f46e5;
            --header-to:    #7c3aed;
            --sent-bg:      #4f46e5;
            --sent-text:    #ffffff;
            --recv-bg:      #ffffff;
            --recv-text:    #1a1a2e;
            --input-bg:     #f0f2f5;
            --input-border: #d1d5db;
            --meta:         #9ca3af;
            --shadow:       0 1px 3px rgba(0,0,0,.12);
            --radius-bubble:18px;
            --toast-success:#10b981;
            --toast-error:  #ef4444;
            --file-card-bg: #f3f4f6;
            --file-card-border: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg:           #0f172a;
            --surface:      #1e293b;
            --header-from:  #3730a3;
            --header-to:    #5b21b6;
            --sent-bg:      #4f46e5;
            --sent-text:    #ffffff;
            --recv-bg:      #1e293b;
            --recv-text:    #e2e8f0;
            --input-bg:     #1e293b;
            --input-border: #334155;
            --meta:         #64748b;
            --shadow:       0 1px 3px rgba(0,0,0,.4);
            --file-card-bg: #263148;
            --file-card-border: #334155;
        }

        /* ─── Reset ─── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--recv-text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Header ─── */
        header {
            background: linear-gradient(135deg, var(--header-from), var(--header-to));
            color: #fff;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        header .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,.5);
            flex-shrink: 0;
            background: rgba(255,255,255,.15);
        }
        header .avatar-placeholder {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        header .info { flex: 1; min-width: 0; }
        header .info .app-name { font-weight: 600; font-size: 1rem; }
        header .info .device-row {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.78rem;
            opacity: 0.85;
            margin-top: 1px;
        }
        #deviceName {
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 0.78rem;
            cursor: pointer;
            border-bottom: 1px dashed rgba(255,255,255,.4);
            padding: 0;
            min-width: 60px;
            max-width: 140px;
        }
        #deviceName:focus {
            outline: none;
            border-bottom-color: #fff;
        }
        header .btn-icon {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: opacity .15s, background .15s;
        }
        header .btn-icon:hover { opacity: 1; background: rgba(255,255,255,.12); }

        /* ─── Chat area ─── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            scroll-behavior: smooth;
        }
        #chat:empty::after {
            content: 'No messages yet. Say hello! 👋';
            display: block;
            text-align: center;
            color: var(--meta);
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        /* ─── Bubbles ─── */
        .bubble {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            padding: 0.55rem 0.85rem;
            border-radius: var(--radius-bubble);
            box-shadow: var(--shadow);
            animation: pop-in .2s ease-out;
            word-break: break-word;
        }
        @keyframes pop-in {
            from { opacity: 0; transform: translateY(6px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .bubble.sent {
            background: var(--sent-bg);
            color: var(--sent-text);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        /* received bubbles get color via inline style (per-device color) */
        .bubble.received {
            color: var(--recv-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 2px solid;
        }
        .bubble .sender {
            font-size: 0.7rem;
            font-weight: 600;
            opacity: .7;
            margin-bottom: 2px;
        }
        .bubble .text { font-size: 0.95rem; line-height: 1.45; }
        .bubble .timestamp {
            font-size: 0.65rem;
            opacity: .55;
            align-self: flex-end;
            margin-top: 3px;
        }
        .bubble img {
            max-width: 220px;
            max-height: 220px;
            border-radius: 10px;
            margin-top: 4px;
            display: block;
            object-fit: cover;
        }

        /* ─── File card ─── */
        .file-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--file-card-bg);
            border: 1px solid var(--file-card-border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            margin-top: 4px;
            text-decoration: none;
            color: inherit;
            transition: background .15s;
            max-width: 260px;
        }
        .file-card:hover { background: var(--input-border); }
        .file-card .file-icon { font-size: 1.6rem; flex-shrink: 0; }
        .file-card .file-info { min-width: 0; }
        .file-card .file-info .fname {
            font-size: 0.82rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-card .file-info .fhint { font-size: 0.7rem; opacity: .6; }

        /* ─── Loading spinner ─── */
        #spinner {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--meta);
            font-size: 0.85rem;
            padding: 2rem 0;
        }
        .spin {
            width: 28px; height: 28px;
            border: 3px solid var(--input-border);
            border-top-color: var(--header-from);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Input bar ─── */
        .input-bar {
            flex-shrink: 0;
            background: var(--surface);
            padding: 0.6rem 0.75rem;
            border-top: 1px solid var(--input-border);
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }
        .input-bar textarea {
            flex: 1;
            resize: none;
            border: 1px solid var(--input-border);
            border-radius: 22px;
            padding: 0.55rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--input-bg);
            color: var(--recv-text);
            outline: none;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.4;
            transition: border-color .15s;
        }
        .input-bar textarea:focus { border-color: var(--header-from); }
        .input-bar textarea::placeholder { color: var(--meta); }
        .btn-round {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s, transform .1s;
        }
        .btn-round:active { transform: scale(.93); }
        .btn-attach {
            background: var(--input-bg);
            color: var(--meta);
            border: 1px solid var(--input-border);
        }
        .btn-attach:hover { color: var(--header-from); border-color: var(--header-from); }
        .btn-send {
            background: var(--header-from);
            color: #fff;
        }
        .btn-send:hover { background: var(--header-to); }
        #fileInput { display: none; }

        /* ─── Attachment preview strip ─── */
        #attachPreview {
            flex-shrink: 0;
            background: var(--surface);
            padding: 0 0.75rem 0.4rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--input-border);
            font-size: 0.82rem;
            color: var(--meta);
        }
        #attachPreview .preview-thumb {
            width: 48px; height: 48px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--input-border);
        }
        #attachPreview .preview-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--recv-text);
            font-weight: 500;
        }
        #attachPreview .btn-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--meta);
            font-size: 1.1rem;
            line-height: 1;
        }

        /* ─── Toast notifications ─── */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 1000;
            pointer-events: none;
        }
        .toast {
            background: #1e293b;
            color: #fff;
            padding: 0.5rem 1.1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(0,0,0,.25);
            animation: toast-in .25s ease-out, toast-out .3s ease-in 2.2s forwards;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .toast.success::before { content: '✓'; color: var(--toast-success); }
        .toast.error::before   { content: '✕'; color: var(--toast-error); }
        @keyframes toast-in  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toast-out { from { opacity:1; } to { opacity:0; } }

        /* ─── Version footer ─── */
        #version {
            text-align: center;
            font-size: 0.7rem;
            color: var(--meta);
            padding: 2px 0 4px;
            background: var(--surface);
            flex-shrink: 0;
        }

        /* ─── Scrollbar ─── */
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--input-border); border-radius: 4px; }

        /* ─── Mobile tweaks ─── */
        @media (max-width: 480px) {
            header { padding: 0.6rem 0.75rem; }
            .bubble { max-width: 88%; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div id="avatarWrap"></div>
        <div class="info">
            <div class="app-name">mbl2pc</div>
            <div class="device-row">
                📱 <input id="deviceName" type="text" placeholder="Device name" title="Click to rename this device">
            </div>
        </div>
        <!-- Dark mode toggle -->
        <button class="btn-icon" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
            <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
            </svg>
        </button>
        <!-- Logout -->
        <button class="btn-icon" id="logoutBtn" title="Logout" aria-label="Logout" onclick="window.location.href='/logout'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
        </button>
    </header>

    <!-- Chat messages -->
    <div id="spinner">
        <div class="spin"></div>
        Loading messages…
    </div>
    <div id="chat"></div>

    <!-- Attachment preview strip -->
    <div id="attachPreview">
        <span id="previewContent"></span>
        <span id="previewName" class="preview-name"></span>
        <button class="btn-clear" id="clearAttach" title="Remove attachment">✕</button>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
        <input type="file" id="fileInput" accept="*">
        <button class="btn-round btn-attach" id="attachBtn" title="Attach file" aria-label="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <textarea id="msgInput" rows="1" placeholder="Message…" autocomplete="off"></textarea>
        <button class="btn-round btn-send" id="sendBtn" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <!-- Version -->
    <div id="version"></div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <script>
    const API = window.location.origin;

    // ── Toast ──────────────────────────────────────────────────────────
    function toast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 2600);
    }

    // ── Theme toggle ───────────────────────────────────────────────────
    const html = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(dark) {
        html.setAttribute('data-theme', dark ? 'dark' : 'light');
        themeIcon.innerHTML = dark
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
        localStorage.setItem('mbl2pc_theme', dark ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('mbl2pc_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme ? savedTheme === 'dark' : prefersDark);
    document.getElementById('themeToggle').addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') !== 'dark');
    });

    // ── Device name ────────────────────────────────────────────────────
    function detectDevice() {
        const ua = navigator.userAgent;
        if (/iPad/.test(ua)) return 'iPad';
        if (/iPhone/.test(ua)) return 'iPhone';
        if (/Android/.test(ua)) return 'Android';
        if (/CrOS/.test(ua)) return 'Chromebook';
        if (/Macintosh|Mac OS X/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'PC';
        if (/Linux/.test(ua)) return 'Linux';
        return 'Device';
    }
    const deviceInput = document.getElementById('deviceName');
    let deviceName = localStorage.getItem('mbl2pc_sender') || detectDevice();
    deviceInput.value = deviceName;
    deviceInput.addEventListener('change', () => {
        deviceName = deviceInput.value.trim() || detectDevice();
        deviceInput.value = deviceName;
        localStorage.setItem('mbl2pc_sender', deviceName);
        toast('Device name saved');
    });

    // ── User profile / avatar ──────────────────────────────────────────
    async function loadMe() {
        try {
            const res = await fetch(API + '/me');
            if (!res.ok) return;
            const data = await res.json();
            const wrap = document.getElementById('avatarWrap');
            if (data.picture) {
                const img = document.createElement('img');
                img.className = 'avatar';
                img.src = data.picture;
                img.alt = data.name || 'Avatar';
                wrap.appendChild(img);
            } else {
                const ph = document.createElement('div');
                ph.className = 'avatar-placeholder';
                ph.textContent = (data.name || '?')[0].toUpperCase();
                wrap.appendChild(ph);
            }
        } catch (_) {}
    }

    // ── Version ────────────────────────────────────────────────────────
    async function loadVersion() {
        try {
            const res = await fetch(API + '/version');
            const d = await res.json();
            document.getElementById('version').textContent = 'v' + d.version;
        } catch (_) {
            document.getElementById('version').textContent = '';
        }
    }

    // ── Message rendering ──────────────────────────────────────────────
    const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
    function fileExt(name) {
        return (name || '').split('.').pop().toLowerCase();
    }
    function isImage(name) {
        return IMAGE_EXTS.includes('.' + fileExt(name));
    }
    function fileIcon(name) {
        const ext = fileExt(name);
        if (['pdf'].includes(ext)) return '📄';
        if (['doc','docx'].includes(ext)) return '📝';
        if (['xls','xlsx','csv'].includes(ext)) return '📊';
        if (['ppt','pptx'].includes(ext)) return '📊';
        if (['zip','rar','7z','tar','gz'].includes(ext)) return '🗜️';
        if (['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
        if (['mp3','wav','aac','flac'].includes(ext)) return '🎵';
        return '📎';
    }

    // ── Per-device color palette ───────────────────────────────────────
    // Deterministically pick a pastel bg + border color from the sender name
    const DEVICE_PALETTES = [
        { bg: '#fef3c7', border: '#f59e0b' }, // amber
        { bg: '#d1fae5', border: '#10b981' }, // emerald
        { bg: '#fce7f3', border: '#ec4899' }, // pink
        { bg: '#e0e7ff', border: '#6366f1' }, // indigo-light
        { bg: '#ffedd5', border: '#f97316' }, // orange
        { bg: '#f0fdf4', border: '#22c55e' }, // green
        { bg: '#fdf2f8', border: '#a855f7' }, // purple
        { bg: '#fff1f2', border: '#f43f5e' }, // rose
    ];
    // Dark-mode equivalents (semi-transparent versions)
    const DEVICE_PALETTES_DARK = [
        { bg: '#451a03', border: '#f59e0b' },
        { bg: '#022c22', border: '#10b981' },
        { bg: '#500724', border: '#ec4899' },
        { bg: '#1e1b4b', border: '#6366f1' },
        { bg: '#431407', border: '#f97316' },
        { bg: '#052e16', border: '#22c55e' },
        { bg: '#2e1065', border: '#a855f7' },
        { bg: '#4c0519', border: '#f43f5e' },
    ];
    function senderPalette(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) & 0xffff;
        const idx = hash % DEVICE_PALETTES.length;
        const dark = html.getAttribute('data-theme') === 'dark';
        return dark ? DEVICE_PALETTES_DARK[idx] : DEVICE_PALETTES[idx];
    }

    let lastMsgCount = 0;
    function renderMessages(messages) {
        const chat = document.getElementById('chat');
        if (messages.length === lastMsgCount && lastMsgCount > 0) return; // no change
        lastMsgCount = messages.length;
        chat.innerHTML = '';
        messages.forEach(m => {
            const div = document.createElement('div');
            const isMe = (m.sender || '').toLowerCase() === deviceName.toLowerCase();
            div.className = 'bubble ' + (isMe ? 'sent' : 'received');
            if (!isMe) {
                const p = senderPalette(m.sender || 'unknown');
                div.style.background = p.bg;
                div.style.borderColor = p.border;
            }
            let html = `<span class="sender">${esc(m.sender || 'unknown')}</span>`;
            // Image
            if (m.image_url) {
                html += `<img src="${esc(m.image_url)}" loading="lazy" alt="image">`;
            }
            // General file
            if (m.file_url) {
                const fname = m.file_name || 'file';
                if (isImage(fname)) {
                    html += `<img src="${esc(m.file_url)}" loading="lazy" alt="${esc(fname)}">`;
                } else {
                    html += `<a class="file-card" href="${esc(m.file_url)}" target="_blank" rel="noopener">
                        <span class="file-icon">${fileIcon(fname)}</span>
                        <span class="file-info">
                            <span class="fname">${esc(fname)}</span>
                            <span class="fhint">Tap to download</span>
                        </span>
                    </a>`;
                }
            }
            // Text
            if (m.text) html += `<span class="text">${esc(m.text)}</span>`;
            html += `<span class="timestamp">${esc((m.timestamp || '').replace('T', ' '))}</span>`;
            div.innerHTML = html;
            chat.appendChild(div);
        });
        setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
    }

    function esc(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function fetchMessages() {
        try {
            const res = await fetch(API + '/messages');
            if (res.status === 401) { window.location.href = '/login'; return; }
            const data = await res.json();
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            renderMessages(data.messages || []);
        } catch (_) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
        }
    }

    // ── Attachment handling ────────────────────────────────────────────
    let attachedFile = null;
    const fileInput = document.getElementById('fileInput');
    const attachPreview = document.getElementById('attachPreview');
    const previewContent = document.getElementById('previewContent');
    const previewName = document.getElementById('previewName');

    function showAttachPreview(file) {
        attachedFile = file;
        previewName.textContent = file.name;
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = e => {
                previewContent.innerHTML = `<img class="preview-thumb" src="${e.target.result}" alt="">`;
            };
            reader.readAsDataURL(file);
        } else {
            previewContent.innerHTML = `<span style="font-size:1.6rem">${fileIcon(file.name)}</span>`;
        }
        attachPreview.style.display = 'flex';
    }

    function clearAttach() {
        attachedFile = null;
        fileInput.value = '';
        previewContent.innerHTML = '';
        previewName.textContent = '';
        attachPreview.style.display = 'none';
    }

    document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
    document.getElementById('clearAttach').addEventListener('click', clearAttach);
    fileInput.addEventListener('change', () => {
        if (fileInput.files && fileInput.files[0]) showAttachPreview(fileInput.files[0]);
    });

    // Paste support
    document.addEventListener('paste', e => {
        if (e.clipboardData && e.clipboardData.files.length > 0) {
            showAttachPreview(e.clipboardData.files[0]);
        }
    });
    // Drag-and-drop
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer && e.dataTransfer.files.length > 0) showAttachPreview(e.dataTransfer.files[0]);
    });

    // ── Auto-grow textarea ─────────────────────────────────────────────
    const msgInput = document.getElementById('msgInput');
    msgInput.addEventListener('input', () => {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    });
    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Send ───────────────────────────────────────────────────────────
    document.getElementById('sendBtn').addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text && !attachedFile) return;

        if (attachedFile) {
            await sendAttachment(attachedFile, text);
        } else {
            await sendText(text);
        }
        msgInput.value = '';
        msgInput.style.height = 'auto';
        clearAttach();
        await fetchMessages();
    }

    async function sendText(text) {
        try {
            const fd = new FormData();
            fd.append('msg', text);
            fd.append('sender', deviceName);
            const res = await fetch(API + '/send', { method: 'POST', body: fd });
            if (!res.ok) {
                let detail = `Error ${res.status}`;
                try { const d = await res.json(); detail = d.detail || detail; } catch (_) {}
                console.error('[mbl2pc] /send failed:', detail);
                toast(detail, 'error');
                return;
            }
            toast('Sent!');
        } catch (err) {
            console.error('[mbl2pc] /send exception:', err);
            toast('Send failed — check console', 'error');
        }
    }

    async function sendAttachment(file, caption) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('sender', deviceName);
        fd.append('text', caption);

        const isImg = file.type.startsWith('image/');
        const endpoint = isImg ? '/send-image' : '/send-file';

        try {
            const res = await fetch(API + endpoint, { method: 'POST', body: fd });
            let data = {};
            try { data = await res.json(); } catch (_) {}
            if (!res.ok) {
                toast(data.detail || 'Upload failed', 'error');
            } else {
                toast(isImg ? 'Image sent!' : 'File sent!');
            }
        } catch (_) { toast('Upload failed', 'error'); }
    }

    // ── Init ───────────────────────────────────────────────────────────
    document.getElementById('spinner').style.display = 'flex';
    document.getElementById('chat').style.display = 'none';
    loadMe();
    loadVersion();
    fetchMessages();
    setInterval(fetchMessages, 3000);
    </script>
</body>
</html>
